<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>Calculadora</h1>

    <div id="calculator">

        <form method="POST" action="{{ url_for('index') }}">

            <div class="form-grupo">
                <label for="num1">Primeiro número</label>
                <input type="number" id="num1" name="num1" step="any" required
                       value="{{ request.form.get('num1', '') }}">
            </div>

            <div class="form-grupo">
                <label for="operacao">Operação</label>
                {% set op = request.form.get('operacao', '+') %}  {# lembra qual op estava selecionada #}
                <select id="operacao" name="operacao" required onchange="atualizarCampos()">
                    <option value="+"      {% if op == '+' %}selected{% endif %}>+ Somar</option>
                    <option value="-"      {% if op == '-' %}selected{% endif %}>− Subtrair</option>
                    <option value="*"      {% if op == '*' %}selected{% endif %}>× Multiplicar</option>
                    <option value="/"      {% if op == '/' %}selected{% endif %}>÷ Dividir</option>
                    <option value="**"     {% if op == '**' %}selected{% endif %}>^ Potência</option>
                    <option value="sqrt"   {% if op == 'sqrt' %}selected{% endif %}>√ Raiz quadrada</option>
                    <option value="log"    {% if op == 'log' %}selected{% endif %}>ln Logaritmo natural</option>
                    <option value="bhaskara" {% if op == 'bhaskara' %}selected{% endif %}>± Bhaskara</option>
                </select>
            </div>

            <div class="form-grupo" id="grupo-num2">
                <label for="num2" id="label-num2">Segundo número</label>
                <input type="number" id="num2" name="num2" step="any"
                       value="{{ request.form.get('num2', '') }}">
            </div>

            <div class="form-grupo" id="grupo-num3" style="display:none">
                <label for="num3">Terceiro número (c)</label>
                <input type="number" id="num3" name="num3" step="any"
                       value="{{ request.form.get('num3', '') }}">
            </div>

            <button type="submit">Calcular</button>
        </form>

        {% if etapas %}
        <div class="resultado">
            <strong>Resposta do servidor (Python):</strong>
            <div>{{ etapas }}</div>          {# mostra a conta montada #}
            <div>Resultado: {{ resultados }}</div>  {# mostra o valor final #}
        </div>
        {% endif %}

        <a href="{{ url_for('index') }}">Limpar / nova conta</a>
    </div>

    <script>
        function atualizarCampos() {
            const op = document.getElementById("operacao").value;
            const grupo2 = document.getElementById("grupo-num2");
            const num2   = document.getElementById("num2");
            const label2 = document.getElementById("label-num2");
            const grupo3 = document.getElementById("grupo-num3");
            const num3   = document.getElementById("num3");

            const semNum2 = op === "sqrt" || op === "log";

            const bhaskara = op === "bhaskara";

            grupo2.style.display = semNum2 ? "none" : "block";
            num2.required = !semNum2;
            if (semNum2) num2.value = "";

            if (bhaskara) {
                label2.textContent = "Segundo número (b)";
                grupo3.style.display = "block";
                num3.required = true;
            } else {
                label2.textContent = "Segundo número";
                grupo3.style.display = "none";
                num3.required = false;
                num3.value = "";
            }
        }

        atualizarCampos();
    </script>

</body>
</html>
